<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Коридор Онлайн</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            margin: 0; padding: 10px; background-color: #151515; color: #fff;
            font-family: -apple-system, sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start; min-height: 100vh;
            box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none;
        }
        
        /* Мобильное Свайп-меню */
        .slider-container { width: 100%; max-width: 350px; overflow: hidden; margin-top: 30px; border-radius: 16px; background: #202020; box-shadow: 0 12px 32px rgba(0,0,0,0.7); }
        .tabs-header { display: flex; background: #1a1a1a; border-bottom: 2px solid #282828; }
        .tab-link { flex: 1; padding: 15px; text-align: center; font-weight: bold; color: #777; cursor: pointer; transition: 0.3s; }
        .tab-link.active { color: #f1c40f; border-bottom: 3px solid #f1c40f; background: #202020; }
        .slider-track { display: flex; width: 200%; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        .slide-pane { width: 50%; padding: 25px; box-sizing: border-box; text-align: center; }
        
        h2 { margin-top: 0; font-size: 1.4rem; color: #fff; }
        input { width: 100%; padding: 14px; margin: 12px 0; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; font-size: 1rem; box-sizing: border-box; outline: none; }
        input:focus { border-color: #f1c40f; }
        
        .menu-btn { width: 100%; padding: 14px; background: #3498db; color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .menu-btn.create { background: #e74c3c; }
        .menu-btn.join { background: #2ecc71; }
        .menu-btn:active { transform: scale(0.97); }

        /* Игровой экран */
        #game-layout { display: none; flex-direction: column; align-items: center; width: 100%; position: relative; }
        
        /* Верхний бар управления */
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 370px; margin-bottom: 12px; }
        #room-info-tag { background: #2a2a2a; padding: 8px 14px; border-radius: 20px; font-size: 0.85rem; color: #f1c40f; font-weight: bold; letter-spacing: 1px; margin: 0; }
        
        #live-leave-btn { 
            width: 36px; height: 36px; background: #c0392b; color: white; border: none; 
            border-radius: 8px; font-size: 1.1rem; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #live-leave-btn:active { transform: scale(0.92); background: #a93226; }

        #players-panel { display: flex; justify-content: space-between; width: 100%; max-width: 370px; margin-bottom: 12px; }
        .player-block { position: relative; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 48%; padding: 10px; background: #1e1e1e; border-radius: 10px; border: 2px solid transparent; box-sizing: border-box; transition: 0.2s; }
        .player-block.active-me { border-color: #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }
        .player-block.active-opp { border-color: #444; }
        .player-name { font-weight: bold; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        
        /* Всплывающее облако эмодзи */
        .emoji-bubble { position: absolute; top: -45px; background: #fff; color: #000; font-size: 1.8rem; padding: 4px 8px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: popAndFade 2.5s forwards; pointer-events: none; z-index: 10; }
        .emoji-bubble::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border-width: 6px 6px 0; border-style: solid; border-color: #fff transparent; display: block; width: 0; }

        @keyframes popAndFade {
            0% { transform: scale(0.5) translateY(10px); opacity: 0; }
            15% { transform: scale(1.1) translateY(0); opacity: 1; }
            30% { transform: scale(1) translateY(0); opacity: 1; }
            80% { opacity: 1; transform: translateY(-5px); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        .color-p1 { color: #e74c3c !important; } 
        .color-p2 { color: #3498db !important; } 
        
        .slots-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .wall-slot { width: 10px; height: 10px; border-radius: 50%; background-color: #333; }
        .wall-slot.available { background-color: #f1c40f; }

        #game-container { background-color: #252525; padding: 8px; border-radius: 12px; box-shadow: 0 12px 24px rgba(0,0,0,0.6); margin-bottom: 15px; }
        #board { display: grid; grid-template-columns: repeat(9, 35px); grid-template-rows: repeat(9, 35px); gap: 6px; position: relative; }
        @media (min-width: 400px) { #board { grid-template-columns: repeat(9, 39px); grid-template-rows: repeat(9, 39px); gap: 7px; } }
        
        .cell { background-color: #383838; border-radius: 5px; position: relative; transition: background 0.2s; }
        .pawn { width: 75%; height: 75%; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 4px 8px rgba(0,0,0,0.4); z-index: 2; }
        
        .pawn.p1-style { background-color: #e74c3c; } 
        .pawn.p2-style { background-color: #3498db; } 
        
        .valid-move::after { content: ''; position: absolute; width: 35%; height: 35%; background: rgba(255,255,255,0.4); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        /* Инвентарь и эмодзи-кнопка */
        #inventory-row { display: flex; gap: 10px; width: 100%; max-width: 370px; align-items: center; margin-bottom: 15px; }
        #inventory { display: flex; justify-content: center; align-items: center; gap: 45px; background: #1a1a1a; padding: 12px; border-radius: 12px; flex: 1; box-sizing: border-box; height: 95px; border: 1px solid #252525; }
        
        .drag-wrapper { display: flex; align-items: center; justify-content: center; cursor: grab; padding: 20px; }
        .drag-handle { background-color: #f1c40f; border-radius: 4px; box-shadow: 0 3px 6px rgba(0,0,0,0.5); pointer-events: none; }
        .drag-handle.h { width: 76px; height: 7px; }
        .drag-handle.v { width: 7px; height: 76px; }
        @media (min-width: 400px) { .drag-handle.h { width: 85px; height: 8px; } .drag-handle.v { width: 8px; height: 85px; } }
        .disabled { opacity: 0.15 !important; pointer-events: none; }

        /* Секция выбора Эмодзи */
        .emoji-trigger-btn { width: 50px; height: 95px; background: #2c3e50; border: 1px solid #34495e; border-radius: 12px; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .emoji-trigger-btn:active { transform: scale(0.95); }
        .emoji-trigger-btn.cooldown { opacity: 0.4; cursor: not-allowed; pointer-events: none; position: relative; }
        
        #emoji-panel { display: none; position: absolute; bottom: 115px; right: 0; background: #252525; border: 2px solid #333; padding: 8px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); gap: 8px; z-index: 100; }
        .emoji-option { font-size: 1.6rem; cursor: pointer; transition: 0.15s; padding: 4px; }
        .emoji-option:active { transform: scale(1.3); }
        
        .wall-render { position: absolute; background-color: #f1c40f; z-index: 5; border-radius: 4px; }
        .wall-render.preview { background-color: rgba(241, 196, 15, 0.4); z-index: 4; }
        #ghost-wall { position: fixed; background-color: #f1c40f; opacity: 0.9; z-index: 9999; border-radius: 4px; display: none; }

        #waiting-screen { display: none; color: #aaa; margin-top: 50px; text-align: center; }

        /* Полноэкранные Поп-апы / Оверлеи */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }
        .modal-box { background: #222; padding: 30px; border-radius: 16px; text-align: center; max-width: 300px; width: 85%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        .modal-box h2 { color: #f1c40f; margin-bottom: 10px; font-size: 1.4rem; }
        .modal-box p { color: #ccc; margin-bottom: 25px; font-size: 1rem; line-height: 1.4; }
        .modal-btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.15s; }
        .modal-btn:active { transform: scale(0.97); }
        .modal-btn.restart { background: #2ecc71; color: white; }
        .modal-btn.menu { background: #7f8c8d; color: white; }
        .modal-btn.cancel { background: #34495e; color: white; }
        .modal-btn.confirm-leave { background: #e74c3c; color: white; }

        /* Красивый кастомный Тост (Alert) */
        #toast-notification {
            position: fixed; top: -70px; left: 50%; transform: translateX(-50%);
            background: #2c3e50; color: #fff; padding: 12px 24px; border-radius: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); font-weight: bold; z-index: 11000;
            display: flex; align-items: center; gap: 10px; font-size: 0.95rem;
            border: 1px solid #34495e; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none; text-align: center; max-width: 90%; width: max-content;
        }
        #toast-notification.show { top: 25px; }
    </style>
</head>
<body>

    <div id="toast-notification">
        <span id="toast-icon">⚠️</span>
        <span id="toast-text">Уведомление</span>
    </div>

    <div id="auth-menu" class="slider-container">
        <input type="text" id="username-input" placeholder="Введите ваш никнейм" maxlength="12" style="width: calc(100% - 30px); margin: 15px auto 5px auto; display: block;">
        <div class="tabs-header">
            <div id="tab-c" class="tab-link active" onclick="switchTab(0)">Создать игру</div>
            <div id="tab-j" class="tab-link" onclick="switchTab(1)">Войти по коду</div>
        </div>
        <div class="slider-track" id="slider-track">
            <div class="slide-pane">
                <h2>Новая комната</h2>
                <button class="menu-btn create" id="btn-create">Создать</button>
            </div>
            <div class="slide-pane">
                <h2>Подключение</h2>
                <input type="text" id="room-code-input" placeholder="Код из 4 символов" maxlength="4" style="text-transform: uppercase;">
                <button class="menu-btn join" id="btn-join">Войти</button>
            </div>
        </div>
    </div>

    <div id="waiting-screen">
        <p>Код комнаты создан. Ожидание соперника...</p>
        <h1 id="waiting-code-display" style="color: #f1c40f; letter-spacing: 4px; font-size: 2.5rem; margin: 10px 0;">----</h1>
        <button id="waiting-leave-btn" class="menu-btn" style="background: #555; max-width: 200px;">Отмена</button>
    </div>

    <div id="game-layout">
        <div class="top-bar">
            <div id="room-info-tag">КОМНАТА: <span id="room-id-span">----</span></div>
            <button id="live-leave-btn">🚪</button>
        </div>
        
        <div id="players-panel">
            <div id="opp-block" class="player-block opp">
                <div class="player-name" id="opp-name-label">Соперник</div>
                <div id="slots-opp" class="slots-grid"></div>
            </div>
            <div id="me-block" class="player-block me">
                <div class="player-name" id="me-name-label">Вы</div>
                <div id="slots-me" class="slots-grid"></div>
            </div>
        </div>
        
        <div id="game-container">
            <div id="board"></div>
        </div>
        
        <div id="inventory-row">
            <div id="inventory">
                <div id="wrapper-h" class="drag-wrapper"><div class="drag-handle h"></div></div>
                <div id="wrapper-v" class="drag-wrapper"><div class="drag-handle v"></div></div>
            </div>
            
            <div style="position: relative;">
                <button id="emoji-btn" class="emoji-trigger-btn">💬</button>
                <div id="emoji-panel">
                    <span class="emoji-option" onclick="sendEmoji('😁')">😁</span>
                    <span class="emoji-option" onclick="sendEmoji('😅')">😅</span>
                    <span class="emoji-option" onclick="sendEmoji('😂')">😂</span>
                    <span class="emoji-option" onclick="sendEmoji('😭')">😭</span>
                    <span class="emoji-option" onclick="sendEmoji('😡')">😡</span>
                </div>
            </div>
        </div>
    </div>

    <div id="end-game-overlay" class="modal-overlay">
        <div class="modal-box">
            <h2 id="end-title">Игра окончена!</h2>
            <p id="end-subtitle">Вы победили!</p>
            <button id="modal-restart-btn" class="modal-btn restart">Начать заново (0/2)</button>
            <button id="modal-menu-btn" class="modal-btn menu">В главное меню</button>
        </div>
    </div>

    <div id="confirm-leave-overlay" class="modal-overlay">
        <div class="modal-box">
            <h2>Сдаться?</h2>
            <p>Вы уверены, что хотите покинуть матч? Вам будет засчитано поражение.</p>
            <button id="confirm-leave-yes" class="modal-btn confirm-leave">Да, выйти</button>
            <button id="confirm-leave-no" class="modal-btn cancel">Отмена</button>
        </div>
    </div>

    <div id="ghost-wall"></div>

<script>
    // ========== ПОДКЛЮЧЕНИЕ К СЕРВЕРУ ЧЕРЕЗ serveo.net ==========
    const SERVER_URL = 'https://f62e27f6e20c2605-89-39-121-3.serveousercontent.com';
    const socket = io(SERVER_URL, {
        transports: ['websocket', 'polling'],
        reconnection: true,
        reconnectionAttempts: 5
    });
    
    // ========== ОСТАЛЬНОЙ КОД ==========
    const boardEl = document.getElementById('board');
    const ghostWall = document.getElementById('ghost-wall');
    const track = document.getElementById('slider-track');
    const overlay = document.getElementById('end-game-overlay');
    const confirmLeaveOverlay = document.getElementById('confirm-leave-overlay');
    const emojiBtn = document.getElementById('emoji-btn');
    const emojiPanel = document.getElementById('emoji-panel');
    
    let myPlayerIndex = null; 
    let currentRoomCode = null;
    let isGameReady = false; 
    let autoMenuTimeout = null;
    let emojiCooldown = false;

    let namesMap = { me: 'Вы', opp: 'Соперник' };
    let gameState = null;

    let isDragging = false;
    let currentDragType = 'h';

    function clearGameState() {
        gameState = {
            players: [
                { x: 4, y: 8, walls: 10, targetY: 0, class: 'p1' }, 
                { x: 4, y: 0, walls: 10, targetY: 8, class: 'p2' }  
            ],
            turn: 0,
            vWalls: Array(8).fill().map(() => Array(8).fill(false)),
            hWalls: Array(8).fill().map(() => Array(8).fill(false)),
            gameOver: false
        };
        
        isDragging = false;
        
        document.querySelectorAll('.wall-render').forEach(e => e.remove());
        document.querySelectorAll('.pawn').forEach(e => e.remove());
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('valid-move'));
    }

    function showAlert(text, icon = '⚠️') {
        const toast = document.getElementById('toast-notification');
        document.getElementById('toast-icon').innerText = icon;
        document.getElementById('toast-text').innerText = text;
        
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    function switchTab(index) {
        track.style.transform = `translateX(-${index * 50}%)`;
        document.getElementById('tab-c').classList.toggle('active', index === 0);
        document.getElementById('tab-j').classList.toggle('active', index === 1);
    }

    let touchStartX = 0;
    document.getElementById('auth-menu').addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
    document.getElementById('auth-menu').addEventListener('touchend', e => {
        let diff = e.changedTouches[0].screenX - touchStartX;
        if (diff < -60) switchTab(1); 
        if (diff > 60) switchTab(0);  
    }, {passive: true});

    const usernameInput = document.getElementById('username-input');
    if (localStorage.getItem('quoridor_username')) {
        usernameInput.value = localStorage.getItem('quoridor_username');
    }

    function saveName() {
        let val = usernameInput.value.trim();
        if (val) localStorage.setItem('quoridor_username', val);
    }

    document.getElementById('btn-create').addEventListener('click', () => {
        saveName();
        socket.emit('create_room', { nickname: usernameInput.value });
    });

    document.getElementById('btn-join').addEventListener('click', () => {
        saveName();
        const code = document.getElementById('room-code-input').value.trim().toUpperCase();
        if(!code) return showAlert('Введите код комнаты!');
        socket.emit('join_room', { nickname: usernameInput.value, room_code: code });
    });

    document.getElementById('waiting-leave-btn').addEventListener('click', resetToMainMenu);
    
    document.getElementById('live-leave-btn').addEventListener('click', () => {
        confirmLeaveOverlay.style.display = 'flex';
    });
    
    document.getElementById('confirm-leave-no').addEventListener('click', () => {
        confirmLeaveOverlay.style.display = 'none';
    });
    
    document.getElementById('confirm-leave-yes').addEventListener('click', () => {
        confirmLeaveOverlay.style.display = 'none';
        socket.emit('leave_to_menu', { room_code: currentRoomCode });
        resetToMainMenu();
    });
    
    document.getElementById('modal-menu-btn').addEventListener('click', () => {
        socket.emit('leave_to_menu', { room_code: currentRoomCode });
        resetToMainMenu();
    });

    document.getElementById('modal-restart-btn').addEventListener('click', () => {
        document.getElementById('modal-restart-btn').disabled = true;
        document.getElementById('modal-restart-btn').innerText = "Ожидание...";
        socket.emit('vote_restart', { room_code: currentRoomCode });
    });

    emojiBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (emojiCooldown) return;
        emojiPanel.style.display = emojiPanel.style.display === 'flex' ? 'none' : 'flex';
    });

    document.addEventListener('click', () => {
        emojiPanel.style.display = 'none';
    });

    function sendEmoji(emoji) {
        if (emojiCooldown) return;
        socket.emit('make_move', {
            room_code: currentRoomCode, type: 'emoji', pIdx: myPlayerIndex,
            emoji: emoji, nextTurn: gameState.turn, gameOver: gameState.gameOver
        });
        
        showEmojiBubble('me', emoji);
        
        emojiCooldown = true;
        emojiBtn.classList.add('cooldown');
        emojiPanel.style.display = 'none';
        
        let sec = 5;
        emojiBtn.innerText = sec;
        let timer = setInterval(() => {
            sec--;
            if (sec <= 0) {
                clearInterval(timer);
                emojiCooldown = false;
                emojiBtn.classList.remove('cooldown');
                emojiBtn.innerText = '💬';
            } else {
                emojiBtn.innerText = sec;
            }
        }, 1000);
    }

    function showEmojiBubble(target, emoji) {
        const block = document.getElementById(target === 'me' ? 'me-block' : 'opp-block');
        if (!block) return;
        
        const oldBubble = block.querySelector('.emoji-bubble');
        if (oldBubble) oldBubble.remove();
        
        const bubble = document.createElement('div');
        bubble.className = 'emoji-bubble';
        bubble.innerText = emoji;
        block.appendChild(bubble);
        
        setTimeout(() => bubble.remove(), 2500);
    }

    // ========== СОБЫТИЯ СОКЕТА ==========
    socket.on('connect', () => {
        console.log('✅ Подключено к серверу!');
        showAlert('Подключено к серверу!', '✅');
    });

    socket.on('connect_error', (error) => {
        console.error('❌ Ошибка подключения:', error);
        showAlert('Не удалось подключиться к серверу!', '❌');
    });

    socket.on('room_created', (data) => {
        currentRoomCode = data.room_code;
        myPlayerIndex = data.player_index;
        document.getElementById('auth-menu').style.display = 'none';
        document.getElementById('waiting-screen').style.display = 'block';
        document.getElementById('waiting-code-display').innerText = currentRoomCode;
    });

    socket.on('room_joined', (data) => {
        currentRoomCode = data.room_code;
        myPlayerIndex = data.player_index;
        document.getElementById('auth-menu').style.display = 'none';
    });

    socket.on('game_start', (data) => {
        clearTimeout(autoMenuTimeout);
        overlay.style.display = 'none';
        document.getElementById('waiting-screen').style.display = 'none';
        document.getElementById('game-layout').style.display = 'flex';
        document.getElementById('room-id-span').innerText = currentRoomCode;
        
        let meLabel = document.getElementById('me-name-label');
        let oppLabel = document.getElementById('opp-name-label');
        
        if (myPlayerIndex === 0) {
            namesMap.me = data.p1_name; namesMap.opp = data.p2_name;
            meLabel.className = "player-name color-p1";
            oppLabel.className = "player-name color-p2";
        } else {
            namesMap.me = data.p2_name; namesMap.opp = data.p1_name;
            meLabel.className = "player-name color-p2";
            oppLabel.className = "player-name color-p1";
        }
        
        meLabel.innerText = namesMap.me;
        oppLabel.innerText = namesMap.opp;
        
        document.getElementById('modal-restart-btn').disabled = false;
        document.getElementById('modal-restart-btn').innerText = "Начать заново (0/2)";
        
        isGameReady = true;
        clearGameState();
        initGame();
        showAlert('Игра началась! Удачи.', '🎮');
    });

    socket.on('receive_move', (data) => {
        if (data.type === 'emoji') {
            showEmojiBubble('opp', data.emoji);
            return;
        }
        
        if (data.type === 'pawn') {
            gameState.players[data.pIdx].x = data.x;
            gameState.players[data.pIdx].y = data.y;
        } else if (data.type === 'wall') {
            gameState[data.wallType === 'h' ? 'hWalls' : 'vWalls'][data.y][data.x] = true;
            gameState.players[data.pIdx].walls--;
        }
        gameState.turn = data.nextTurn;
        gameState.gameOver = data.gameOver;
        
        if (gameState.gameOver) triggerEndGame(false);
        updateUI();
    });

    socket.on('restart_voted_update', (data) => {
        document.getElementById('modal-restart-btn').innerText = `Начать заново (${data.count}/2)`;
    });

    socket.on('receive_restart', () => {
        clearGameState();
        updateUI();
    });

    socket.on('opponent_left_to_menu', () => {
        showAlert('Соперник вышел в главное меню.', '🚪');
        resetToMainMenu();
    });

    socket.on('player_disconnected', (data) => {
        showAlert(data.message, '🔌');
        resetToMainMenu();
    });

    socket.on('error_message', (data) => showAlert(data.message, '❌'));

    // ========== ИГРОВЫЕ ФУНКЦИИ ==========
    function tx(x) { return myPlayerIndex === 1 ? 8 - x : x; }
    function ty(y) { return myPlayerIndex === 1 ? 8 - y : y; }
    function twx(x) { return myPlayerIndex === 1 ? 7 - x : x; }
    function twy(y) { return myPlayerIndex === 1 ? 7 - y : y; }

    function isMyTurn() {
        return isGameReady && gameState && !gameState.gameOver && (gameState.turn === myPlayerIndex);
    }

    function initGame() {
        boardEl.innerHTML = '';
        for (let y = 0; y < 9; y++) {
            for (let x = 0; x < 9; x++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.vx = x; cell.dataset.vy = y;
                cell.addEventListener('pointerdown', () => {
                    handleCellClick(tx(x), ty(y));
                });
                boardEl.appendChild(cell);
            }
        }
        buildSlots();
        setupDragEvents();
        updateUI();
    }

    function buildSlots() {
        const slotsMe = document.getElementById('slots-me'); slotsMe.innerHTML = '';
        const slotsOpp = document.getElementById('slots-opp'); slotsOpp.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            slotsMe.appendChild(document.createElement('div'));
            slotsOpp.appendChild(document.createElement('div'));
        }
    }

    function setupDragEvents() {
        document.getElementById('wrapper-h').onpointerdown = (e) => startDrag(e, 'h');
        document.getElementById('wrapper-v').onpointerdown = (e) => startDrag(e, 'v');
        window.onpointermove = doDrag; window.onpointerup = endDrag;
    }

    function updateUI() {
        if (!gameState) return;
        document.querySelectorAll('.pawn').forEach(e => e.remove());
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('valid-move'));
        document.querySelectorAll('.wall-render:not(.preview)').forEach(e => e.remove());

        for(let y=0; y<8; y++) {
            for(let x=0; x<8; x++) {
                if (gameState.hWalls[y][x]) renderWallOnBoard(twx(x), twy(y), 'h'); 
                if (gameState.vWalls[y][x]) renderWallOnBoard(twx(x), twy(y), 'v');
            }
        }

        gameState.players.forEach((p, idx) => {
            let cell = document.querySelector(`.cell[data-vx="${tx(p.x)}"][data-vy="${ty(p.y)}"]`);
            if (cell) {
                let pawn = document.createElement('div');
                pawn.className = `pawn ${idx === 0 ? 'p1-style' : 'p2-style'}`;
                cell.appendChild(pawn);
            }
        });

        document.getElementById('me-block').className = 'player-block me' + (gameState.turn === myPlayerIndex ? ' active-me' : '');
        document.getElementById('opp-block').className = 'player-block opp' + (gameState.turn !== myPlayerIndex ? ' active-opp' : '');

        let hasWalls = gameState.players[myPlayerIndex].walls > 0;
        document.getElementById('inventory').classList.toggle('disabled', !isMyTurn() || !hasWalls);

        let myRem = gameState.players[myPlayerIndex].walls;
        let oppRem = gameState.players[1 - myPlayerIndex].walls;
        
        let sMe = document.getElementById('slots-me').children;
        let sOpp = document.getElementById('slots-opp').children;
        
        for (let i = 0; i < 10; i++) {
            if(sMe[i]) sMe[i].className = 'wall-slot' + (i < myRem ? ' available' : '');
            if(sOpp[i]) sOpp[i].className = 'wall-slot' + (i < oppRem ? ' available' : '');
        }

        if (isMyTurn()) {
            getValidMoves(myPlayerIndex).forEach(m => {
                let cell = document.querySelector(`.cell[data-vx="${tx(m.x)}"][data-vy="${ty(m.y)}"]`);
                if (cell) cell.classList.add('valid-move');
            });
        }
    }

    function handleCellClick(absX, absY) {
        if (!isMyTurn() || isDragging) return;
        let moves = getValidMoves(myPlayerIndex);
        if (moves.some(m => m.x === absX && m.y === absY)) {
            gameState.players[myPlayerIndex].x = absX;
            gameState.players[myPlayerIndex].y = absY;
            
            let isWin = (absY === gameState.players[myPlayerIndex].targetY);
            if (isWin) gameState.gameOver = true;

            let nextTurn = 1 - myPlayerIndex;
            socket.emit('make_move', {
                room_code: currentRoomCode, type: 'pawn', pIdx: myPlayerIndex,
                x: absX, y: absY, nextTurn: nextTurn, gameOver: gameState.gameOver
            });

            gameState.turn = nextTurn;
            updateUI();
            if (isWin) triggerEndGame(true);
        }
    }

    function getValidMoves(pIdx) {
        let moves = []; let p = gameState.players[pIdx]; let opp = gameState.players[1 - pIdx];
        const isWallH = (x, y) => (x >= 0 && x < 8 && y >= 0 && y < 8) ? gameState.hWalls[y][x] : false;
        const isWallV = (x, y) => (x >= 0 && x < 8 && y >= 0 && y < 8) ? gameState.vWalls[y][x] : false;

        const directions = [
            { dx: 0, dy: -1, wallCheck: () => isWallH(p.x, p.y - 1) || isWallH(p.x - 1, p.y - 1) },
            { dx: 0, dy: 1,  wallCheck: () => isWallH(p.x, p.y) || isWallH(p.x - 1, p.y) },
            { dx: -1, dy: 0, wallCheck: () => isWallV(p.x - 1, p.y) || isWallV(p.x - 1, p.y - 1) },
            { dx: 1, dy: 0,  wallCheck: () => isWallV(p.x, p.y) || isWallV(p.x, p.y - 1) }
        ];

        directions.forEach(d => {
            let nx = p.x + d.dx, ny = p.y + d.dy;
            if (nx >= 0 && nx < 9 && ny >= 0 && ny < 9 && !d.wallCheck()) {
                if (nx === opp.x && ny === opp.y) {
                    let jumpX = nx + d.dx, jumpY = ny + d.dy; let wallBehind = false;
                    if (d.dx === 0 && d.dy === -1) wallBehind = isWallH(nx, ny - 1) || isWallH(nx - 1, ny - 1);
                    if (d.dx === 0 && d.dy === 1)  wallBehind = isWallH(nx, ny) || isWallH(nx - 1, ny);
                    if (d.dx === -1 && d.dy === 0) wallBehind = isWallV(nx - 1, ny) || isWallV(nx - 1, ny - 1);
                    if (d.dx === 1 && d.dy === 0)  wallBehind = isWallV(nx, ny) || isWallV(nx, ny - 1);
                    if (jumpX >= 0 && jumpX < 9 && jumpY >= 0 && jumpY < 9 && !wallBehind) moves.push({ x: jumpX, y: jumpY });
                } else { moves.push({ x: nx, y: ny }); }
            }
        });
        return moves;
    }

    function startDrag(e, type) {
        if (!isMyTurn() || gameState.players[myPlayerIndex].walls <= 0) return;
        isDragging = true; currentDragType = type;
        let m = getGridMetrics();
        
        if (type === 'h') { ghostWall.style.width = `${m.cellSize * 2 + m.gap}px`; ghostWall.style.height = `${m.gap}px`; }
        else { ghostWall.style.width = `${m.gap}px`; ghostWall.style.height = `${m.cellSize * 2 + m.gap}px`; }
        
        ghostWall.style.display = 'block'; e.currentTarget.setPointerCapture(e.pointerId); moveGhost(e);
    }

    function moveGhost(e) {
        let w = parseFloat(ghostWall.style.width), h = parseFloat(ghostWall.style.height);
        ghostWall.style.left = `${e.clientX - w/2}px`; ghostWall.style.top = `${e.clientY - h/2}px`;
    }

    function doDrag(e) {
        if (!isDragging) return; moveGhost(e);
        let vCoord = getBoardIntersection(e.clientX, e.clientY);
        document.querySelectorAll('.wall-render.preview').forEach(el => el.remove());
        if (vCoord) {
            let absX = tx(vCoord.x), absY = ty(vCoord.y);
            if (myPlayerIndex === 1) { absX = absX - 1; absY = absY - 1; } 
            
            if (absX >= 0 && absX < 8 && absY >= 0 && absY < 8 && canPlaceWall(absX, absY, currentDragType)) {
                renderWallOnBoard(vCoord.x, vCoord.y, currentDragType, true);
            }
        }
    }

    function endDrag(e) {
        if (!isDragging) return; isDragging = false; ghostWall.style.display = 'none';
        try { e.target.releasePointerCapture(e.pointerId); } catch(err) {}
        let vCoord = getBoardIntersection(e.clientX, e.clientY);
        document.querySelectorAll('.wall-render.preview').forEach(el => el.remove());

        if (vCoord) {
            let absX = tx(vCoord.x), absY = ty(vCoord.y);
            if (myPlayerIndex === 1) { absX = absX - 1; absY = absY - 1; }

            if (absX >= 0 && absX < 8 && absY >= 0 && absY < 8 && canPlaceWall(absX, absY, currentDragType)) {
                gameState[currentDragType === 'h' ? 'hWalls' : 'vWalls'][absY][absX] = true;
                
                if (hasPathToTarget(0) && hasPathToTarget(1)) {
                    gameState.players[myPlayerIndex].walls--;
                    let nextTurn = 1 - myPlayerIndex;

                    socket.emit('make_move', {
                        room_code: currentRoomCode, type: 'wall', wallType: currentDragType,
                        pIdx: myPlayerIndex, x: absX, y: absY, nextTurn: nextTurn, gameOver: false
                    });
                    gameState.turn = nextTurn;
                } else {
                    gameState[currentDragType === 'h' ? 'hWalls' : 'vWalls'][absY][absX] = false;
                    showAlert("Нельзя полностью блокировать проход игрокам!", "❌");
                }
            }
        }
        updateUI();
    }

    function getBoardIntersection(clientX, clientY) {
        let rect = boardEl.getBoundingClientRect(); let m = getGridMetrics();
        let localX = clientX - rect.left - 8; let localY = clientY - rect.top - 8;
        let step = m.cellSize + m.gap;
        let gridX = Math.round((localX - m.cellSize) / step); let gridY = Math.round((localY - m.cellSize) / step);
        if (gridX >= 0 && gridX < 8 && gridY >= 0 && gridY < 8) return { x: gridX, y: gridY };
        return null;
    }

    function canPlaceWall(x, y, type) {
        if (type === 'h') {
            if (gameState.hWalls[y][x] || (x > 0 && gameState.hWalls[y][x-1]) || (x < 7 && gameState.hWalls[y][x+1]) || gameState.vWalls[y][x]) return false;
        } else {
            if (gameState.vWalls[y][x] || (y > 0 && gameState.vWalls[y-1][x]) || (y < 7 && gameState.vWalls[y+1][x]) || gameState.hWalls[y][x]) return false;
        }
        return true;
    }

    function getGridMetrics() {
        if(!boardEl.children.length) return { cellSize: 35, gap: 6 };
        let firstCell = boardEl.children[0]; let cellSize = firstCell.offsetWidth;
        let gap = parseFloat(window.getComputedStyle(boardEl).gap); return { cellSize, gap };
    }

    function renderWallOnBoard(vx, vy, visualType, isPreview = false) {
        let m = getGridMetrics(); let wall = document.createElement('div');
        wall.className = 'wall-render' + (isPreview ? ' preview' : '');
        let step = m.cellSize + m.gap;
        if (visualType === 'h') {
            wall.style.height = `${m.gap}px`; wall.style.width = `${m.cellSize * 2 + m.gap}px`;
            wall.style.left = `${8 + vx * step}px`; wall.style.top = `${8 + m.cellSize + vy * step}px`;
        } else {
            wall.style.width = `${m.gap}px`; wall.style.height = `${m.cellSize * 2 + m.gap}px`;
            wall.style.left = `${8 + m.cellSize + vx * step}px`; wall.style.top = `${8 + vy * step}px`;
        }
        boardEl.appendChild(wall);
    }

    function hasPathToTarget(playerIdx) {
        let p = gameState.players[playerIdx]; let queue = [{ x: p.x, y: p.y }];
        let visited = Array(9).fill().map(() => Array(9).fill(false)); visited[p.y][p.x] = true;
        const isWallH = (x, y) => (x >= 0 && x < 8 && y >= 0 && y < 8) ? gameState.hWalls[y][x] : false;
        const isWallV = (x, y) => (x >= 0 && x < 8 && y >= 0 && y < 8) ? gameState.vWalls[y][x] : false;

        while(queue.length > 0) {
            let curr = queue.shift(); if (curr.y === p.targetY) return true;
            let cx = curr.x, cy = curr.y;
            const dirs = [
                { dx: 0, dy: -1, blocked: () => isWallH(cx, cy - 1) || isWallH(cx - 1, cy - 1) },
                { dx: 0, dy: 1,  blocked: () => isWallH(cx, cy) || isWallH(cx - 1, cy) },
                { dx: -1, dy: 0, blocked: () => isWallV(cx - 1, cy) || isWallV(cx - 1, cy - 1) },
                { dx: 1, dy: 0,  blocked: () => isWallV(cx, cy) || isWallV(cx, cy - 1) }
            ];
            for(let d of dirs) {
                let nx = cx + d.dx, ny = cy + d.dy;
                if (nx >= 0 && nx < 9 && ny >= 0 && ny < 9 && !visited[ny][nx] && !d.blocked()) {
                    visited[ny][nx] = true; queue.push({ x: nx, y: ny });
                }
            }
        }
        return false;
    }

    function triggerEndGame(isIWon) {
        isGameReady = false;
        document.getElementById('end-title').innerText = "Игра окончена!";
        document.getElementById('end-subtitle').innerText = isIWon ? "Вы победили! 🎉" : "Вы проиграли... 🫵";
        overlay.style.display = 'flex';

        clearTimeout(autoMenuTimeout);
        autoMenuTimeout = setTimeout(() => {
            showAlert("Время вышло! Автоматический возврат в меню.", "🕒");
            socket.emit('leave_to_menu', { room_code: currentRoomCode });
            resetToMainMenu();
        }, 60000);
    }

    function resetToMainMenu() {
        clearTimeout(autoMenuTimeout);
        isGameReady = false;
        currentRoomCode = null;
        myPlayerIndex = null;
        emojiCooldown = false;
        emojiBtn.className = 'emoji-trigger-btn';
        emojiBtn.innerText = '💬';
        overlay.style.display = 'none';
        confirmLeaveOverlay.style.display = 'none';
        document.getElementById('game-layout').style.display = 'none';
        document.getElementById('waiting-screen').style.display = 'none';
        document.getElementById('auth-menu').style.display = 'block';
        clearGameState();
        switchTab(0);
    }

    // Логирование подключения
    console.log('🟢 Подключение к серверу:', SERVER_URL);
</script>
