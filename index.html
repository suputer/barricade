<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Коридор Онлайн</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            padding: 10px;
        }
        
        #observers-count {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 9999;
            background: rgba(0,0,0,0.6);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.8rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
        }
        #observers-count .eye { font-size: 0.9rem; }
        #observers-count .count { color: #aaa; font-weight: bold; }

        #reg-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            max-width: 350px;
            gap: 16px;
        }
        #reg-screen h1 {
            color: #f1c40f;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        #reg-screen .avatar-preview-wrap {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #444;
            overflow: hidden;
            cursor: pointer;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        #reg-screen .avatar-preview-wrap:hover {
            border-color: #f1c40f;
            opacity: 0.8;
        }
        #reg-screen .avatar-preview-wrap img,
        #reg-screen .avatar-preview-wrap .placeholder {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #reg-screen .avatar-preview-wrap .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #666;
            background: #1a1a1a;
        }
        #reg-screen .avatar-preview-wrap .upload-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 0.7rem;
            text-align: center;
            padding: 4px 0;
        }
        #reg-screen input[type="file"] { display: none; }
        #reg-screen input[type="text"] {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }
        #reg-screen input[type="text"]:focus { border-color: #f1c40f; }
        #reg-screen .reg-btn {
            width: 100%;
            padding: 14px;
            background: #2ecc71;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        #reg-screen .reg-btn:active { transform: scale(0.97); }
        #reg-screen .reg-btn.back { background: #555; }
        #reg-screen .reg-btn.danger { background: #c0392b; }
        #reg-screen .file-info {
            color: #666;
            font-size: 0.75rem;
            margin-top: -5px;
        }

        #status-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
        }
        #status-text {
            color: #aaa;
            font-size: 1.2rem;
            text-align: center;
            line-height: 1.6;
        }
        #status-text .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top: 3px solid #f1c40f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #game-layout {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
            margin-bottom: 12px;
            gap: 10px;
        }
        #profile-btn {
            width: 36px;
            height: 36px;
            background: #2c3e50;
            border: 1px solid #34495e;
            border-radius: 50%;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            color: #fff;
        }
        #profile-btn:active { transform: scale(0.92); }
        #live-leave-btn {
            width: 36px;
            height: 36px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #live-leave-btn:active {
            transform: scale(0.92);
            background: #a93226;
        }
        
        #players-panel {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 12px;
        }
        .player-block {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            width: 48%;
            padding: 10px;
            background: #1e1e1e;
            border-radius: 10px;
            border: 2px solid transparent;
            box-sizing: border-box;
            transition: 0.2s;
        }
        .player-block.active-me {
            border-color: #f1c40f;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
        }
        .player-block.active-opp { border-color: #444; }
        .player-name-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
        }
        .player-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: #222;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .player-avatar .placeholder {
            font-size: 1.2rem;
            color: #666;
        }
        .player-name {
            font-weight: bold;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 65%;
        }
        .color-p1 .player-avatar { border-color: #e74c3c; }
        .color-p2 .player-avatar { border-color: #3498db; }
        .color-p1 .player-name { color: #e74c3c !important; }
        .color-p2 .player-name { color: #3498db !important; }
        .slots-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
        }
        .wall-slot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #333;
        }
        .wall-slot.available { background-color: #f1c40f; }
        #game-container {
            background-color: #252525;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.6);
            margin-bottom: 15px;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(9, 35px);
            grid-template-rows: repeat(9, 35px);
            gap: 6px;
            position: relative;
        }
        @media (min-width: 400px) {
            #board {
                grid-template-columns: repeat(9, 39px);
                grid-template-rows: repeat(9, 39px);
                gap: 7px;
            }
        }
        .cell {
            background-color: #383838;
            border-radius: 5px;
            position: relative;
            transition: background 0.2s;
        }
        .pawn {
            width: 75%;
            height: 75%;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            z-index: 2;
        }
        .pawn.p1-style { background-color: #e74c3c; }
        .pawn.p2-style { background-color: #3498db; }
        .valid-move::after {
            content: '';
            position: absolute;
            width: 35%;
            height: 35%;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        #inventory-row {
            display: flex;
            gap: 10px;
            width: 100%;
            align-items: center;
            margin-bottom: 15px;
        }
        #inventory {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 45px;
            background: #1a1a1a;
            padding: 12px;
            border-radius: 12px;
            flex: 1;
            box-sizing: border-box;
            height: 95px;
            border: 1px solid #252525;
        }
        #inventory.observer-mode { display: none !important; }
        .drag-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            padding: 20px;
        }
        .drag-handle {
            background-color: #f1c40f;
            border-radius: 4px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .drag-handle.h { width: 76px; height: 7px; }
        .drag-handle.v { width: 7px; height: 76px; }
        @media (min-width: 400px) {
            .drag-handle.h { width: 85px; height: 8px; }
            .drag-handle.v { width: 8px; height: 85px; }
        }
        .disabled {
            opacity: 0.15 !important;
            pointer-events: none;
        }

        .emoji-trigger-btn {
            width: 50px;
            height: 95px;
            background: #2c3e50;
            border: 1px solid #34495e;
            border-radius: 12px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .emoji-trigger-btn:active { transform: scale(0.95); }
        .emoji-trigger-btn.cooldown {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        .emoji-trigger-btn.observer-mode { display: none !important; }
        #emoji-panel {
            display: none;
            position: absolute;
            bottom: 115px;
            right: 0;
            background: #252525;
            border: 2px solid #333;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            gap: 8px;
            z-index: 100;
        }
        .emoji-option {
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.15s;
            padding: 4px;
        }
        .emoji-option:active { transform: scale(1.3); }
        .emoji-bubble {
            position: absolute;
            top: -45px;
            background: #fff;
            color: #000;
            font-size: 1.8rem;
            padding: 4px 8px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            animation: popAndFade 2.5s forwards;
            pointer-events: none;
            z-index: 10;
        }
        .emoji-bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: #fff transparent;
            display: block;
            width: 0;
        }
        @keyframes popAndFade {
            0% { transform: scale(0.5) translateY(10px); opacity: 0; }
            15% { transform: scale(1.1) translateY(0); opacity: 1; }
            30% { transform: scale(1) translateY(0); opacity: 1; }
            80% { opacity: 1; transform: translateY(-5px); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        .wall-render {
            position: absolute;
            background-color: #f1c40f;
            z-index: 5;
            border-radius: 4px;
        }
        .wall-render.preview {
            background-color: rgba(241, 196, 15, 0.4);
            z-index: 4;
        }
        #ghost-wall {
            position: fixed;
            background-color: #f1c40f;
            opacity: 0.9;
            z-index: 9999;
            border-radius: 4px;
            display: none;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal-box {
            background: #222;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 300px;
            width: 85%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .modal-box h2 { color: #f1c40f; margin-bottom: 10px; font-size: 1.4rem; }
        .modal-box p { color: #ccc; margin-bottom: 25px; font-size: 1rem; line-height: 1.4; }
        .modal-btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.15s;
        }
        .modal-btn:active { transform: scale(0.97); }
        .modal-btn.restart { background: #2ecc71; color: white; }
        .modal-btn.menu { background: #7f8c8d; color: white; }
        .modal-btn.cancel { background: #34495e; color: white; }
        .modal-btn.confirm-leave { background: #e74c3c; color: white; }
        #toast-notification {
            position: fixed;
            top: -70px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e50;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            font-weight: bold;
            z-index: 11000;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            border: 1px solid #34495e;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            text-align: center;
            max-width: 90%;
            width: max-content;
        }
        #toast-notification.show { top: 25px; }

        .observer-mode .player-avatar { border-color: #444 !important; }
        .observer-mode .player-name { color: #666 !important; }
    </style>
</head>
<body>

    <div id="observers-count">
        <span class="eye">👁️</span>
        <span class="count" id="observers-count-value">0</span>
    </div>

    <div id="toast-notification">
        <span id="toast-icon">⚠️</span>
        <span id="toast-text">Уведомление</span>
    </div>

    <div id="reg-screen">
        <h1>👤 Профиль</h1>
        <div class="avatar-preview-wrap" id="avatar-preview-wrap" title="Нажмите чтобы загрузить фото">
            <div class="placeholder" id="avatar-placeholder">👤</div>
            <div class="upload-overlay">📷 Загрузить</div>
        </div>
        <input type="file" id="avatar-input" accept="image/*">
        <div class="file-info" id="file-info">Максимум 2 МБ</div>
        <input type="text" id="nickname-input" placeholder="Введите никнейм" maxlength="16">
        <button class="reg-btn" id="reg-save-btn">💾 Сохранить</button>
        <button class="reg-btn back" id="reg-back-btn">← Назад</button>
        <button class="reg-btn danger" id="reg-remove-avatar-btn">🗑️ Удалить аватар</button>
    </div>

    <div id="status-screen">
        <div id="status-text">
            <span id="status-message">Загрузка...</span>
        </div>
    </div>

    <div id="game-layout">
        <div class="top-bar">
            <button id="profile-btn">👤</button>
            <button id="live-leave-btn">🚪</button>
        </div>
        
        <div id="players-panel">
            <div id="p1-block" class="player-block">
                <div class="player-name-wrapper">
                    <div class="player-avatar" id="p1-avatar"><span class="placeholder">👤</span></div>
                    <div class="player-name color-p1" id="p1-name-label">Игрок 1</div>
                </div>
                <div id="slots-p1" class="slots-grid"></div>
            </div>
            <div id="p2-block" class="player-block">
                <div class="player-name-wrapper">
                    <div class="player-avatar" id="p2-avatar"><span class="placeholder">👤</span></div>
                    <div class="player-name color-p2" id="p2-name-label">Игрок 2</div>
                </div>
                <div id="slots-p2" class="slots-grid"></div>
            </div>
        </div>
        
        <div id="game-container">
            <div id="board"></div>
        </div>
        
        <div id="inventory-row">
            <div id="inventory">
                <div id="wrapper-h" class="drag-wrapper"><div class="drag-handle h"></div></div>
                <div id="wrapper-v" class="drag-wrapper"><div class="drag-handle v"></div></div>
            </div>
            <div style="position: relative;">
                <button id="emoji-btn" class="emoji-trigger-btn">💬</button>
                <div id="emoji-panel">
                    <span class="emoji-option" onclick="sendEmoji('😁')">😁</span>
                    <span class="emoji-option" onclick="sendEmoji('😅')">😅</span>
                    <span class="emoji-option" onclick="sendEmoji('😂')">😂</span>
                    <span class="emoji-option" onclick="sendEmoji('😭')">😭</span>
                    <span class="emoji-option" onclick="sendEmoji('😡')">😡</span>
                </div>
            </div>
        </div>
    </div>

    <div id="end-game-overlay" class="modal-overlay">
        <div class="modal-box">
            <h2 id="end-title">Игра окончена!</h2>
            <p id="end-subtitle">Вы победили!</p>
            <button id="modal-restart-btn" class="modal-btn restart">Начать заново (0/2)</button>
            <button id="modal-menu-btn" class="modal-btn menu">В главное меню</button>
        </div>
    </div>

    <div id="confirm-leave-overlay" class="modal-overlay">
        <div class="modal-box">
            <h2>Сдаться?</h2>
            <p>Вы уверены, что хотите покинуть матч? Вам будет засчитано поражение.</p>
            <button id="confirm-leave-yes" class="modal-btn confirm-leave">Да, выйти</button>
            <button id="confirm-leave-no" class="modal-btn cancel">Отмена</button>
        </div>
    </div>

    <div id="ghost-wall"></div>

<script>
    // ========== LOCALSTORAGE ==========
    function getNickname() {
        return localStorage.getItem('NicknameBarricade') || 'Vid';
    }

    function getAvatar() {
        return localStorage.getItem('AvatarBarricade') || null;
    }

    function saveProfile(nickname, avatar) {
        localStorage.setItem('NicknameBarricade', nickname);
        if (avatar) {
            localStorage.setItem('AvatarBarricade', avatar);
        } else {
            localStorage.removeItem('AvatarBarricade');
        }
    }

    // ========== ПОЛУЧАЕМ ПАРАМЕТРЫ URL ==========
    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    const isRegPage = urlParams.has('reg');

    // ========== ПОДКЛЮЧЕНИЕ К СЕРВЕРУ ==========
    const SERVER_URL = 'https://barricadegame.serveousercontent.com';
    const socket = io(SERVER_URL, {
        transports: ['websocket', 'polling'],
        reconnection: true,
        reconnectionAttempts: 5
    });

    // ========== ЭЛЕМЕНТЫ DOM ==========
    const boardEl = document.getElementById('board');
    const ghostWall = document.getElementById('ghost-wall');
    const overlay = document.getElementById('end-game-overlay');
    const confirmLeaveOverlay = document.getElementById('confirm-leave-overlay');
    const emojiBtn = document.getElementById('emoji-btn');
    const emojiPanel = document.getElementById('emoji-panel');
    const statusScreen = document.getElementById('status-screen');
    const statusMessage = document.getElementById('status-message');
    const gameLayout = document.getElementById('game-layout');
    const inventory = document.getElementById('inventory');
    const observersCountEl = document.getElementById('observers-count-value');
    const p1NameLabel = document.getElementById('p1-name-label');
    const p2NameLabel = document.getElementById('p2-name-label');
    const p1Avatar = document.getElementById('p1-avatar');
    const p2Avatar = document.getElementById('p2-avatar');
    const slotsP1 = document.getElementById('slots-p1');
    const slotsP2 = document.getElementById('slots-p2');
    const regScreen = document.getElementById('reg-screen');
    const nicknameInput = document.getElementById('nickname-input');
    const avatarPreviewWrap = document.getElementById('avatar-preview-wrap');
    const avatarPlaceholder = document.getElementById('avatar-placeholder');
    const avatarInput = document.getElementById('avatar-input');
    const fileInfo = document.getElementById('file-info');
    const regSaveBtn = document.getElementById('reg-save-btn');
    const regBackBtn = document.getElementById('reg-back-btn');
    const regRemoveAvatarBtn = document.getElementById('reg-remove-avatar-btn');
    const profileBtn = document.getElementById('profile-btn');

    // ========== ПЕРЕМЕННЫЕ ==========
    let myPlayerIndex = null;
    let currentRoomCode = null;
    let isGameReady = false;
    let autoMenuTimeout = null;
    let emojiCooldown = false;
    let isObserver = false;
    let gameState = null;
    let isDragging = false;
    let currentDragType = 'h';
    let observersCount = 0;
    let myNickname = getNickname();
    let myAvatar = getAvatar();
    let tempAvatar = myAvatar;

    // ========== ФУНКЦИИ ОТОБРАЖЕНИЯ АВАТАРА ==========
    function renderAvatar(element, avatarData) {
        element.innerHTML = '';
        if (avatarData && avatarData.startsWith('data:image')) {
            const img = document.createElement('img');
            img.src = avatarData;
            img.alt = 'avatar';
            img.onerror = function() {
                element.innerHTML = '<span class="placeholder">👤</span>';
            };
            element.appendChild(img);
        } else {
            const placeholder = document.createElement('span');
            placeholder.className = 'placeholder';
            placeholder.textContent = '👤';
            element.appendChild(placeholder);
        }
    }

    function renderAvatarPreview(avatarData) {
        avatarPlaceholder.innerHTML = '';
        if (avatarData && avatarData.startsWith('data:image')) {
            const img = document.createElement('img');
            img.src = avatarData;
            img.alt = 'avatar';
            img.onerror = function() {
                avatarPlaceholder.textContent = '👤';
                avatarPlaceholder.style.display = 'flex';
                avatarPlaceholder.style.alignItems = 'center';
                avatarPlaceholder.style.justifyContent = 'center';
                avatarPlaceholder.style.fontSize = '3rem';
                avatarPlaceholder.style.color = '#666';
                avatarPlaceholder.style.width = '100%';
                avatarPlaceholder.style.height = '100%';
            };
            avatarPlaceholder.appendChild(img);
        } else {
            avatarPlaceholder.textContent = '👤';
            avatarPlaceholder.style.display = 'flex';
            avatarPlaceholder.style.alignItems = 'center';
            avatarPlaceholder.style.justifyContent = 'center';
            avatarPlaceholder.style.fontSize = '3rem';
            avatarPlaceholder.style.color = '#666';
            avatarPlaceholder.style.width = '100%';
            avatarPlaceholder.style.height = '100%';
        }
    }

    // ========== ФУНКЦИИ ОТОБРАЖЕНИЯ ==========
    function showStatus(text, showSpinner = false) {
        statusScreen.style.display = 'flex';
        gameLayout.style.display = 'none';
        regScreen.style.display = 'none';
        let html = text;
        if (showSpinner) html += '<div class="spinner"></div>';
        statusMessage.innerHTML = html;
    }

    function showError(text) {
        statusScreen.style.display = 'flex';
        gameLayout.style.display = 'none';
        regScreen.style.display = 'none';
        statusMessage.innerHTML = text;
    }

    function showToast(text, icon = '⚠️') {
        const toast = document.getElementById('toast-notification');
        document.getElementById('toast-icon').innerText = icon;
        document.getElementById('toast-text').innerText = text;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function updateObserversCount(count) {
        observersCount = count || 0;
        observersCountEl.textContent = observersCount;
    }

    // ========== РЕГИСТРАЦИЯ / ПРОФИЛЬ ==========
    function showRegPage() {
        regScreen.style.display = 'flex';
        statusScreen.style.display = 'none';
        gameLayout.style.display = 'none';
        nicknameInput.value = myNickname;
        tempAvatar = myAvatar;
        renderAvatarPreview(tempAvatar);
    }

    function hideRegPage() {
        regScreen.style.display = 'none';
        if (roomCode) {
            showStatus('Ожидаем игроков...', true);
            socket.emit('join_room_by_code', {
                room_code: roomCode.toUpperCase(),
                nickname: myNickname,
                avatar: myAvatar
            });
        } else {
            showError('Параметр не найден!');
        }
    }

    avatarPreviewWrap.addEventListener('click', () => {
        avatarInput.click();
    });

    avatarInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (file.size > 2 * 1024 * 1024) {
            showToast('Файл слишком большой! Максимум 2 МБ.', '❌');
            fileInfo.textContent = '❌ Превышен лимит 2 МБ';
            avatarInput.value = '';
            return;
        }

        if (!file.type.startsWith('image/')) {
            showToast('Пожалуйста, загрузите изображение!', '❌');
            avatarInput.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
            tempAvatar = event.target.result;
            renderAvatarPreview(tempAvatar);
            fileInfo.textContent = `✅ Загружено: ${file.name} (${(file.size / 1024).toFixed(1)} КБ)`;
            showToast('Аватар загружен!', '✅');
        };
        reader.onerror = () => {
            showToast('Ошибка загрузки файла!', '❌');
        };
        reader.readAsDataURL(file);
    });

    regRemoveAvatarBtn.addEventListener('click', () => {
        tempAvatar = null;
        renderAvatarPreview(null);
        avatarInput.value = '';
        fileInfo.textContent = 'Аватар удален';
        showToast('Аватар удален', '🗑️');
    });

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        if (isRegPage) {
            showRegPage();
            return;
        }

        if (!roomCode) {
            showError('Параметр не найден!');
            return;
        }

        currentRoomCode = roomCode.toUpperCase();
        showStatus('Ожидаем игроков...', true);
        
        socket.emit('join_room_by_code', {
            room_code: currentRoomCode,
            nickname: myNickname,
            avatar: myAvatar
        });
    }

    // ========== СОБЫТИЯ СОКЕТА ==========
    socket.on('connect', () => {
        showToast('Подключено к серверу!', '✅');
    });

    socket.on('disconnect', () => {
        showToast('Соединение потеряно!', '🔌');
    });

    socket.on('connect_error', (error) => {
        showToast('Не удалось подключиться к серверу!', '❌');
    });

    socket.on('room_joined', (data) => {
        myPlayerIndex = data.player_index;
        currentRoomCode = data.room_code;
        isObserver = false;
        showStatus('Ожидаем игроков...', true);
        showToast('Вы вошли в комнату!', '✅');
    });

    socket.on('game_state_sync', (data) => {
        isObserver = true;
        statusScreen.style.display = 'none';
        gameLayout.style.display = 'flex';
        
        inventory.classList.add('observer-mode');
        emojiBtn.classList.add('observer-mode');

        gameState = {
            players: data.players,
            turn: data.turn,
            vWalls: data.vWalls,
            hWalls: data.hWalls,
            gameOver: data.gameOver
        };

        p1NameLabel.textContent = data.p1_name || 'Игрок 1';
        p2NameLabel.textContent = data.p2_name || 'Игрок 2';
        renderAvatar(p1Avatar, data.p1_avatar);
        renderAvatar(p2Avatar, data.p2_avatar);

        document.getElementById('p1-block').classList.add('observer-mode');
        document.getElementById('p2-block').classList.add('observer-mode');

        if (data.observers_count !== undefined) {
            updateObserversCount(data.observers_count);
        }

        initGame();
        updateUI();
        showToast('Вы наблюдатель!', '👀');
    });

    socket.on('game_start', (data) => {
        clearTimeout(autoMenuTimeout);
        overlay.style.display = 'none';
        statusScreen.style.display = 'none';
        gameLayout.style.display = 'flex';

        inventory.classList.remove('observer-mode');
        emojiBtn.classList.remove('observer-mode');

        p1NameLabel.textContent = data.p1_name || 'Игрок 1';
        p2NameLabel.textContent = data.p2_name || 'Игрок 2';
        renderAvatar(p1Avatar, data.p1_avatar);
        renderAvatar(p2Avatar, data.p2_avatar);

        document.getElementById('p1-block').classList.remove('observer-mode');
        document.getElementById('p2-block').classList.remove('observer-mode');

        document.getElementById('modal-restart-btn').disabled = false;
        document.getElementById('modal-restart-btn').innerText = "Начать заново (0/2)";

        isGameReady = true;
        isObserver = false;
        clearGameState();
        initGame();
        showToast('Игра началась! Удачи.', '🎮');
    });

    socket.on('receive_move', (data) => {
        if (data.type === 'emoji') {
            showEmojiBubble(data.pIdx === 0 ? 'p1' : 'p2', data.emoji);
            return;
        }

        if (data.type === 'pawn') {
            gameState.players[data.pIdx].x = data.x;
            gameState.players[data.pIdx].y = data.y;
        } else if (data.type === 'wall') {
            gameState[data.wallType === 'h' ? 'hWalls' : 'vWalls'][data.y][data.x] = true;
            gameState.players[data.pIdx].walls--;
        }
        gameState.turn = data.nextTurn;
        gameState.gameOver = data.gameOver;

        if (gameState.gameOver) triggerEndGame(false);
        updateUI();
    });

    socket.on('observers_update', (data) => {
        updateObserversCount(data.count);
    });

    socket.on('restart_voted_update', (data) => {
        document.getElementById('modal-restart-btn').innerText = `Начать заново (${data.count}/2)`;
    });

    socket.on('receive_restart', () => {
        clearGameState();
        updateUI();
        showToast('Игра перезапущена!', '🔄');
    });

    socket.on('opponent_left_to_menu', () => {
        showToast('Соперник вышел в главное меню.', '🚪');
        resetToMainMenu();
    });

    socket.on('player_disconnected', (data) => {
        showToast(data.message, '🔌');
        resetToMainMenu();
    });

    socket.on('error_message', (data) => {
        showToast(data.message, '❌');
    });

    // ========== ИГРОВЫЕ ФУНКЦИИ ==========
    function tx(x) { return myPlayerIndex === 1 ? 8 - x : x; }
    function ty(y) { return myPlayerIndex === 1 ? 8 - y : y; }
    function twx(x) { return myPlayerIndex === 1 ? 7 - x : x; }
    function twy(y) { return myPlayerIndex === 1 ? 7 - y : y; }

    function isMyTurn() {
        if (isObserver) return false;
        return isGameReady && gameState && !gameState.gameOver && (gameState.turn === myPlayerIndex);
    }

    function clearGameState() {
        gameState = {
            players: [
                { x: 4, y: 8, walls: 10, targetY: 0, class: 'p1' },
                { x: 4, y: 0, walls: 10, targetY: 8, class: 'p2' }
            ],
            turn: 0,
            vWalls: Array(8).fill().map(() => Array(8).fill(false)),
            hWalls: Array(8).fill().map(() => Array(8).fill(false)),
            gameOver: false
        };
        isDragging = false;
        document.querySelectorAll('.wall-render').forEach(e => e.remove());
        document.querySelectorAll('.pawn').forEach(e => e.remove());
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('valid-move'));
    }

    function initGame() {
        boardEl.innerHTML = '';
        for (let y = 0; y < 9; y++) {
            for (let x = 0; x < 9; x++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.vx = x;
                cell.dataset.vy = y;
                cell.addEventListener('pointerdown', () => {
                    handleCellClick(tx(x), ty(y));
                });
                boardEl.appendChild(cell);
            }
        }
        buildSlots();
        setupDragEvents();
        updateUI();
    }

    function buildSlots() {
        slotsP1.innerHTML = '';
        slotsP2.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            slotsP1.appendChild(document.createElement('div'));
            slotsP2.appendChild(document.createElement('div'));
        }
    }

    function setupDragEvents() {
        document.getElementById('wrapper-h').onpointerdown = (e) => startDrag(e, 'h');
        document.getElementById('wrapper-v').onpointerdown = (e) => startDrag(e, 'v');
        window.onpointermove = doDrag;
        window.onpointerup = endDrag;
    }

    function updateUI() {
        if (!gameState) return;
        document.querySelectorAll('.pawn').forEach(e => e.remove());
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('valid-move'));
        document.querySelectorAll('.wall-render:not(.preview)').forEach(e => e.remove());

        for (let y = 0; y < 8; y++) {
            for (let x = 0; x < 8; x++) {
                if (gameState.hWalls[y][x]) renderWallOnBoard(twx(x), twy(y), 'h');
                if (gameState.vWalls[y][x]) renderWallOnBoard(twx(x), twy(y), 'v');
            }
        }

        gameState.players.forEach((p, idx) => {
            let cell = document.querySelector(`.cell[data-vx="${tx(p.x)}"][data-vy="${ty(p.y)}"]`);
            if (cell) {
                let pawn = document.createElement('div');
                pawn.className = `pawn ${idx === 0 ? 'p1-style' : 'p2-style'}`;
                cell.appendChild(pawn);
            }
        });

        if (!isObserver) {
            const p1Block = document.getElementById('p1-block');
            const p2Block = document.getElementById('p2-block');
            p1Block.className = 'player-block' + (gameState.turn === 0 ? ' active-me' : '');
            p2Block.className = 'player-block' + (gameState.turn === 1 ? ' active-me' : '');
        }

        let p1Walls = gameState.players[0].walls;
        let p2Walls = gameState.players[1].walls;
        let sP1 = slotsP1.children;
        let sP2 = slotsP2.children;

        for (let i = 0; i < 10; i++) {
            if (sP1[i]) sP1[i].className = 'wall-slot' + (i < p1Walls ? ' available' : '');
            if (sP2[i]) sP2[i].className = 'wall-slot' + (i < p2Walls ? ' available' : '');
        }

        if (!isObserver && isMyTurn()) {
            getValidMoves(myPlayerIndex).forEach(m => {
                let cell = document.querySelector(`.cell[data-vx="${tx(m.x)}"][data-vy="${ty(m.y)}"]`);
                if (cell) cell.classList.add('valid-move');
            });
        }
    }

    function handleCellClick(absX, absY) {
        if (isObserver || !isMyTurn() || isDragging) return;
        let moves = getValidMoves(myPlayerIndex);
        if (moves.some(m => m.x === absX && m.y === absY)) {
            gameState.players[myPlayerIndex].x = absX;
            gameState.players[myPlayerIndex].y = absY;

            let isWin = (absY === gameState.players[myPlayerIndex].targetY);
            if (isWin) gameState.gameOver = true;

            let nextTurn = 1 - myPlayerIndex;
            socket.emit('make_move', {
                room_code: currentRoomCode,
                type: 'pawn',
                pIdx: myPlayerIndex,
                x: absX,
                y: absY,
                nextTurn: nextTurn,
                gameOver: gameState.gameOver
            });

            gameState.turn = nextTurn;
            updateUI();
            if (isWin) triggerEndGame(true);
        }
    }

    function getValidMoves(pIdx) {
        let moves = [];
        let p = gameState.players[pIdx];
        let opp = gameState.players[1 - pIdx];
        const isWallH = (x, y) => (x >= 0 && x < 8 && y >= 0 && y < 8) ? gameState.hWalls[y][x] : false;
        const isWallV = (x, y) => (x >= 0 && x < 8 && y >= 0 && y < 8) ? gameState.vWalls[y][x] : false;

        const directions = [
            { dx: 0, dy: -1, wallCheck: () => isWallH(p.x, p.y - 1) || isWallH(p.x - 1, p.y - 1) },
            { dx: 0, dy: 1, wallCheck: () => isWallH(p.x, p.y) || isWallH(p.x - 1, p.y) },
            { dx: -1, dy: 0, wallCheck: () => isWallV(p.x - 1, p.y) || isWallV(p.x - 1, p.y - 1) },
            { dx: 1, dy: 0, wallCheck: () => isWallV(p.x, p.y) || isWallV(p.x, p.y - 1) }
        ];

        directions.forEach(d => {
            let nx = p.x + d.dx,
                ny = p.y + d.dy;
            if (nx >= 0 && nx < 9 && ny >= 0 && ny < 9 && !d.wallCheck()) {
                if (nx === opp.x && ny === opp.y) {
                    let jumpX = nx + d.dx,
                        jumpY = ny + d.dy;
                    let wallBehind = false;
                    if (d.dx === 0 && d.dy === -1) wallBehind = isWallH(nx, ny - 1) || isWallH(nx - 1, ny - 1);
                    if (d.dx === 0 && d.dy === 1) wallBehind = isWallH(nx, ny) || isWallH(nx - 1, ny);
                    if (d.dx === -1 && d.dy === 0) wallBehind = isWallV(nx - 1, ny) || isWallV(nx - 1, ny - 1);
                    if (d.dx === 1 && d.dy === 0) wallBehind = isWallV(nx, ny) || isWallV(nx, ny - 1);
                    if (jumpX >= 0 && jumpX < 9 && jumpY >= 0 && jumpY < 9 && !wallBehind) moves.push({ x: jumpX, y: jumpY });
                } else { moves.push({ x: nx, y: ny }); }
            }
        });
        return moves;
    }

    function startDrag(e, type) {
        if (isObserver || !isMyTurn() || gameState.players[myPlayerIndex].walls <= 0) return;
        isDragging = true;
        currentDragType = type;
        let m = getGridMetrics();

        if (type === 'h') {
            ghostWall.style.width = `${m.cellSize * 2 + m.gap}px`;
            ghostWall.style.height = `${m.gap}px`;
        } else {
            ghostWall.style.width = `${m.gap}px`;
            ghostWall.style.height = `${m.cellSize * 2 + m.gap}px`;
        }

        ghostWall.style.display = 'block';
        e.currentTarget.setPointerCapture(e.pointerId);
        moveGhost(e);
    }

    function moveGhost(e) {
        let w = parseFloat(ghostWall.style.width),
            h = parseFloat(ghostWall.style.height);
        ghostWall.style.left = `${e.clientX - w/2}px`;
        ghostWall.style.top = `${e.clientY - h/2}px`;
    }

    function doDrag(e) {
        if (!isDragging) return;
        moveGhost(e);
        let vCoord = getBoardIntersection(e.clientX, e.clientY);
        document.querySelectorAll('.wall-render.preview').forEach(el => el.remove());
        if (vCoord) {
            let absX = tx(vCoord.x),
                absY = ty(vCoord.y);
            if (myPlayerIndex === 1) { absX = absX - 1;
                absY = absY - 1; }

            if (absX >= 0 && absX < 8 && absY >= 0 && absY < 8 && canPlaceWall(absX, absY, currentDragType)) {
                renderWallOnBoard(vCoord.x, vCoord.y, currentDragType, true);
            }
        }
    }

    function endDrag(e) {
        if (!isDragging) return;
        isDragging = false;
        ghostWall.style.display = 'none';
        try { e.target.releasePointerCapture(e.pointerId); } catch (err) {}
        let vCoord = getBoardIntersection(e.clientX, e.clientY);
        document.querySelectorAll('.wall-render.preview').forEach(el => el.remove());

        if (vCoord) {
            let absX = tx(vCoord.x),
                absY = ty(vCoord.y);
            if (myPlayerIndex === 1) { absX = absX - 1;
                absY = absY - 1; }

            if (absX >= 0 && absX < 8 && absY >= 0 && absY < 8 && canPlaceWall(absX, absY, currentDragType)) {
                gameState[currentDragType === 'h' ? 'hWalls' : 'vWalls'][absY][absX] = true;

                if (hasPathToTarget(0) && hasPathToTarget(1)) {
                    gameState.players[myPlayerIndex].walls--;
                    let nextTurn = 1 - myPlayerIndex;

                    socket.emit('make_move', {
                        room_code: currentRoomCode,
                        type: 'wall',
                        wallType: currentDragType,
                        pIdx: myPlayerIndex,
                        x: absX,
                        y: absY,
                        nextTurn: nextTurn,
                        gameOver: false
                    });
                    gameState.turn = nextTurn;
                } else {
                    gameState[currentDragType === 'h' ? 'hWalls' : 'vWalls'][absY][absX] = false;
                    showToast("Нельзя полностью блокировать проход игрокам!", "❌");
                }
            }
        }
        updateUI();
    }

    function getBoardIntersection(clientX, clientY) {
        let rect = boardEl.getBoundingClientRect();
        let m = getGridMetrics();
        let localX = clientX - rect.left - 8;
        let localY = clientY - rect.top - 8;
        let step = m.cellSize + m.gap;
        let gridX = Math.round((localX - m.cellSize) / step);
        let gridY = Math.round((localY - m.cellSize) / step);
        if (gridX >= 0 && gridX < 8 && gridY >= 0 && gridY < 8) return { x: gridX, y: gridY };
        return null;
    }

    function canPlaceWall(x, y, type) {
        if (type === 'h') {
            if (gameState.hWalls[y][x] || (x > 0 && gameState.hWalls[y][x - 1]) || (x < 7 && gameState.hWalls[y][x + 1]) || gameState.vWalls[y][x]) return false;
        } else {
            if (gameState.vWalls[y][x] || (y > 0 && gameState.vWalls[y - 1][x]) || (y < 7 && gameState.vWalls[y + 1][x]) || gameState.hWalls[y][x]) return false;
        }
        return true;
    }

    function getGridMetrics() {
        if (!boardEl.children.length) return { cellSize: 35, gap: 6 };
        let firstCell = boardEl.children[0];
        let cellSize = firstCell.offsetWidth;
        let gap = parseFloat(window.getComputedStyle(boardEl).gap);
        return { cellSize, gap };
    }

    function renderWallOnBoard(vx, vy, visualType, isPreview = false) {
        let m = getGridMetrics();
        let wall = document.createElement('div');
        wall.className = 'wall-render' + (isPreview ? ' preview' : '');
        let step = m.cellSize + m.gap;
        if (visualType === 'h') {
            wall.style.height = `${m.gap}px`;
            wall.style.width = `${m.cellSize * 2 + m.gap}px`;
            wall.style.left = `${8 + vx * step}px`;
            wall.style.top = `${8 + m.cellSize + vy * step}px`;
        } else {
            wall.style.width = `${m.gap}px`;
            wall.style.height = `${m.cellSize * 2 + m.gap}px`;
            wall.style.left = `${8 + m.cellSize + vx * step}px`;
            wall.style.top = `${8 + vy * step}px`;
        }
        boardEl.appendChild(wall);
    }

    function hasPathToTarget(playerIdx) {
        let p = gameState.players[playerIdx];
        let queue = [{ x: p.x, y: p.y }];
        let visited = Array(9).fill().map(() => Array(9).fill(false));
        visited[p.y][p.x] = true;
        const isWallH = (x, y) => (x >= 0 && x < 8 && y >= 0 && y < 8) ? gameState.hWalls[y][x] : false;
        const isWallV = (x, y) => (x >= 0 && x < 8 && y >= 0 && y < 8) ? gameState.vWalls[y][x] : false;

        while (queue.length > 0) {
            let curr = queue.shift();
            if (curr.y === p.targetY) return true;
            let cx = curr.x,
                cy = curr.y;
            const dirs = [
                { dx: 0, dy: -1, blocked: () => isWallH(cx, cy - 1) || isWallH(cx - 1, cy - 1) },
                { dx: 0, dy: 1, blocked: () => isWallH(cx, cy) || isWallH(cx - 1, cy) },
                { dx: -1, dy: 0, blocked: () => isWallV(cx - 1, cy) || isWallV(cx - 1, cy - 1) },
                { dx: 1, dy: 0, blocked: () => isWallV(cx, cy) || isWallV(cx, cy - 1) }
            ];
            for (let d of dirs) {
                let nx = cx + d.dx,
                    ny = cy + d.dy;
                if (nx >= 0 && nx < 9 && ny >= 0 && ny < 9 && !visited[ny][nx] && !d.blocked()) {
                    visited[ny][nx] = true;
                    queue.push({ x: nx, y: ny });
                }
            }
        }
        return false;
    }

    function triggerEndGame(isIWon) {
        isGameReady = false;
        document.getElementById('end-title').innerText = "Игра окончена!";
        document.getElementById('end-subtitle').innerText = isIWon ? "Вы победили! 🎉" : "Вы проиграли... 🫵";
        overlay.style.display = 'flex';

        clearTimeout(autoMenuTimeout);
        autoMenuTimeout = setTimeout(() => {
            showToast("Время вышло! Автоматический возврат в меню.", "🕒");
            socket.emit('leave_to_menu', { room_code: currentRoomCode });
            resetToMainMenu();
        }, 60000);
    }

    function sendEmoji(emoji) {
        if (emojiCooldown || isObserver) return;
        socket.emit('make_move', {
            room_code: currentRoomCode,
            type: 'emoji',
            pIdx: myPlayerIndex,
            emoji: emoji,
            nextTurn: gameState.turn,
            gameOver: gameState.gameOver
        });

        showEmojiBubble(myPlayerIndex === 0 ? 'p1' : 'p2', emoji);

        emojiCooldown = true;
        emojiBtn.classList.add('cooldown');
        emojiPanel.style.display = 'none';

        let sec = 5;
        emojiBtn.innerText = sec;
        let timer = setInterval(() => {
            sec--;
            if (sec <= 0) {
                clearInterval(timer);
                emojiCooldown = false;
                emojiBtn.classList.remove('cooldown');
                emojiBtn.innerText = '💬';
            } else {
                emojiBtn.innerText = sec;
            }
        }, 1000);
    }

    function showEmojiBubble(target, emoji) {
        const blockId = target === 'p1' ? 'p1-block' : 'p2-block';
        const block = document.getElementById(blockId);
        if (!block) return;

        const oldBubble = block.querySelector('.emoji-bubble');
        if (oldBubble) oldBubble.remove();

        const bubble = document.createElement('div');
        bubble.className = 'emoji-bubble';
        bubble.innerText = emoji;
        block.appendChild(bubble);

        setTimeout(() => bubble.remove(), 2500);
    }

    function resetToMainMenu() {
        clearTimeout(autoMenuTimeout);
        isGameReady = false;
        currentRoomCode = null;
        myPlayerIndex = null;
        emojiCooldown = false;
        isObserver = false;
        emojiBtn.className = 'emoji-trigger-btn';
        emojiBtn.innerText = '💬';
        overlay.style.display = 'none';
        confirmLeaveOverlay.style.display = 'none';
        gameLayout.style.display = 'none';
        inventory.classList.remove('observer-mode');
        emojiBtn.classList.remove('observer-mode');
        document.getElementById('p1-block').classList.remove('observer-mode');
        document.getElementById('p2-block').classList.remove('observer-mode');

        showError('Параметр не найден!');
        clearGameState();
    }

    // ========== UI СОБЫТИЯ ==========
    document.getElementById('live-leave-btn').addEventListener('click', () => {
        confirmLeaveOverlay.style.display = 'flex';
    });

    document.getElementById('confirm-leave-no').addEventListener('click', () => {
        confirmLeaveOverlay.style.display = 'none';
    });

    document.getElementById('confirm-leave-yes').addEventListener('click', () => {
        confirmLeaveOverlay.style.display = 'none';
        socket.emit('leave_to_menu', { room_code: currentRoomCode });
        resetToMainMenu();
    });

    document.getElementById('modal-menu-btn').addEventListener('click', () => {
        socket.emit('leave_to_menu', { room_code: currentRoomCode });
        resetToMainMenu();
    });

    document.getElementById('modal-restart-btn').addEventListener('click', () => {
        document.getElementById('modal-restart-btn').disabled = true;
        document.getElementById('modal-restart-btn').innerText = "Ожидание...";
        socket.emit('vote_restart', { room_code: currentRoomCode });
    });

    emojiBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (emojiCooldown || isObserver) return;
        emojiPanel.style.display = emojiPanel.style.display === 'flex' ? 'none' : 'flex';
    });

    document.addEventListener('click', () => {
        emojiPanel.style.display = 'none';
    });

    profileBtn.addEventListener('click', () => {
        showRegPage();
    });

    regBackBtn.addEventListener('click', () => {
        hideRegPage();
    });

    regSaveBtn.addEventListener('click', () => {
        const nickname = nicknameInput.value.trim() || 'Vid';
        myNickname = nickname;
        myAvatar = tempAvatar;
        saveProfile(nickname, myAvatar);
        showToast('Профиль сохранен!', '💾');
        hideRegPage();
    });

    // ========== ЗАПУСК ==========
    init();
</script>
</body>
</html>
